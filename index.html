<head>

  <meta charset="utf-8">
  <title>Glass Memory — 글래스 메모리</title>
  <meta name="description" content="프리미엄 글래스모피즘 디자인의 메모리 게임. Glass Games에서 플레이하세요.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1e">
  <meta property="og:title" content="Glass Memory — 글래스 메모리">
  <meta property="og:description" content="같은 게임, 다른 경험. 프리미엄 글래스모피즘 메모리 게임.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1e;
      color: #e2e8f0;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
      background: linear-gradient(-45deg, #0f0f1e, #0a2a1f, #1a0f2e, #0a1a2e);
      background-size: 400% 400%;
      animation: gradient-shift 15s ease infinite;
    }
    .bg-animation::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(167, 139, 250, 0.08) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
      animation: blob-float 20s ease-in-out infinite;
    }
    @keyframes gradient-shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes blob-float { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(30px,-50px) rotate(120deg)} 66%{transform:translate(-20px,20px) rotate(240deg)} }
    .game-wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 20px;
    }
    .header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 460px;
    }
    .title {
      font-size: 24px; font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .back-link {
      font-size: 13px; color: rgba(255,255,255,0.4); text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #a78bfa; }
    .stats-bar {
      display: flex; gap: 12px; width: 100%; max-width: 460px;
    }
    .stat-card {
      flex: 1; padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; text-align: center;
    }
    .stat-card .label { font-size: 10px; font-weight: 600; text-transform: uppercase; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
    .stat-card .value { font-size: 24px; font-weight: 800; color: #a78bfa; margin-top: 2px; }
    .controls { display: flex; gap: 12px; width: 100%; max-width: 460px; }
    .btn {
      flex: 1; padding: 10px 16px;
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.3);
      color: #a78bfa;
      border-radius: 12px;
      font-weight: 600; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .btn:hover { background: rgba(167, 139, 250, 0.25); border-color: rgba(167, 139, 250, 0.5); }
    .btn:active { transform: scale(0.98); }
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 16px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.3);
      width: 100%; max-width: 460px; aspect-ratio: 1;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 700;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      aspect-ratio: 1;
      user-select: none;
    }
    .card:hover:not(.matched):not(.flipped) {
      background: rgba(255,255,255,0.12);
      border-color: rgba(167, 139, 250, 0.3);
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.1);
    }
    .card.flipped {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.25), rgba(6, 182, 212, 0.15));
      border-color: rgba(167, 139, 250, 0.5);
    }
    .card.matched {
      background: rgba(34, 197, 94, 0.18);
      border-color: rgba(34, 197, 94, 0.4);
      cursor: default;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
    }
    .game-over {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(8px);
    }
    .game-over.active { display: flex; }
    .game-over-content {
      background: rgba(15, 15, 30, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 40px; text-align: center;
      backdrop-filter: blur(20px); max-width: 340px; width: 90%;
    }
    .game-over-content h2 {
      font-size: 28px; margin-bottom: 16px;
      background: linear-gradient(135deg, #a78bfa, #06b6d4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .game-over-content p {
      font-size: 15px; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.6;
    }
    @media (max-width: 480px) {
      .game-board { max-width: calc(100vw - 40px); }
      .header, .stats-bar, .controls { max-width: calc(100vw - 40px); }
      .card { font-size: 26px; }
      .title { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>

  <div class="game-wrapper">
    <div class="header">
      <h1 class="title">Glass Memory</h1>
      <a href="https://www.glassgames.app" class="back-link">← 돌아가기</a>
    </div>

    <div class="stats-bar">
      <div class="stat-card">
        <div class="label">이동</div>
        <div class="value" id="moves">0</div>
      </div>
      <div class="stat-card">
        <div class="label">시간</div>
        <div class="value" id="timer">0s</div>
      </div>
      <div class="stat-card">
        <div class="label">쌍</div>
        <div class="value" id="pairs">0/8</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="resetBtn">새 게임</button>
    </div>

    <div class="game-board" id="gameBoard"></div>
  </div>

  <div class="game-over" id="gameOver">
    <div class="game-over-content">
      <h2>완료! 🎉</h2>
      <p id="finalStats"></p>
      <button class="btn" onclick="location.reload()">다시 시작</button>
    </div>
  </div>

  <script>
    const EMOJIS = ['🌸', '🎭', '🎪', '🎨', '🎬', '🎮', '🎯', '🎲'];
    const CARDS_COUNT = 16;

    let cards = [];
    let flipped = [];
    let matched = [];
    let moves = 0;
    let gameStartTime = null;
    let timerInterval = null;
    let lock = false;

    function initGame() {
      const board = document.getElementById('gameBoard');
      board.innerHTML = '';
      cards = [];
      flipped = [];
      matched = [];
      moves = 0;
      lock = false;
      gameStartTime = Date.now();

      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0/8';
      document.getElementById('gameOver').classList.remove('active');

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 1000);

      let cardValues = [];
      EMOJIS.forEach(emoji => {
        cardValues.push(emoji);
        cardValues.push(emoji);
      });
      cardValues.sort(() => Math.random() - 0.5);

      cardValues.forEach((value, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.index = index;
        card.dataset.value = value;
        card.textContent = '';
        card.addEventListener('click', () => flipCard(index));
        board.appendChild(card);
        cards.push(card);
      });
    }

    function flipCard(index) {
      if (lock) return;
      const card = cards[index];
      if (card.classList.contains('matched') || card.classList.contains('flipped')) return;

      card.classList.add('flipped');
      card.textContent = card.dataset.value;
      flipped.push(index);

      if (flipped.length === 2) {
        moves++;
        document.getElementById('moves').textContent = moves;
        lock = true;
        setTimeout(checkMatch, 700);
      }
    }

    function checkMatch() {
      const [i1, i2] = flipped;
      const c1 = cards[i1], c2 = cards[i2];

      if (c1.dataset.value === c2.dataset.value) {
        c1.classList.add('matched');
        c2.classList.add('matched');
        matched.push(i1, i2);
        document.getElementById('pairs').textContent = `${matched.length / 2}/8`;
        if (matched.length === CARDS_COUNT) endGame();
      } else {
        c1.classList.remove('flipped');
        c2.classList.remove('flipped');
        c1.textContent = '';
        c2.textContent = '';
      }
      flipped = [];
      lock = false;
    }

    function updateTimer() {
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      document.getElementById('timer').textContent = `${elapsed}s`;
    }

    function endGame() {
      clearInterval(timerInterval);
      const elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
      document.getElementById('finalStats').innerHTML =
        `${moves}번의 이동<br>${elapsed}초 만에 완료!`;
      document.getElementById('gameOver').classList.add('active');
    }

    document.getElementById('resetBtn').addEventListener('click', initGame);
    initGame();
  </script>
</body>
</html>
